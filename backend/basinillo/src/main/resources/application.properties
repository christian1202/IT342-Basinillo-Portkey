# ==========================================
# PORTKEY — Application Configuration
# No secrets stored here. All credentials loaded from environment or external file.
# ==========================================
spring.application.name=portkey
server.port=${PORT:8080}

# External config for local development (gitignored)
spring.config.import=optional:classpath:application-secret.properties

# ── Database ──────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Cloudflare R2 ────────────────────────────────────────
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key=${R2_ACCESS_KEY_ID:}
r2.secret-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET_NAME:portkey-documents}
r2.endpoint=https://${r2.account-id}.r2.cloudflarestorage.com

# ── JWT ─────────────────────────────────────────────────
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000

# ── CORS ────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://portkey.vercel.app}
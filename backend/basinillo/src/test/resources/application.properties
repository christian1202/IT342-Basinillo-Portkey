# ==========================================
# TEST CONFIGURATION — H2 In-Memory Database
# ==========================================
spring.application.name=portkey-test
server.port=0

# H2 In-Memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT (dummy values for tests)
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1wb3J0a2V5LXRlc3RzLW1pbmltdW0tMzJieXRlcw==
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000

# CORS
cors.allowed-origins=http://localhost:3000

# Disable unused config for tests
r2.account-id=test-account
r2.access-key=test-key
r2.secret-key=test-secret
r2.bucket=test-bucket
